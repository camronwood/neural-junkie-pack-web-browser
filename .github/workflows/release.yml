name: release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  pack-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make verify
      - run: make pack-zip
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
